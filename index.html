<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced To-Do App</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="header">

        <h1>My To-Do List</h1>

        <button id="themeBtn">
            🌙
        </button>

    </div>


    <div class="input-section">

        <input
        type="text"
        id="taskInput"
        placeholder="Enter task">

        <button id="addBtn">
            Add
        </button>

    </div>


    <input
    type="text"
    id="searchInput"
    placeholder="Search task...">


    <ul id="taskList"></ul>


    <div class="stats">

        <p>Total:
            <span id="total">
                0
            </span>
        </p>

        <p>Completed:
            <span id="completed">
                0
            </span>
        </p>

        <p>Pending:
            <span id="pending">
                0
            </span>
        </p>

    </div>


    <button id="deleteAll">
        Delete All
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
